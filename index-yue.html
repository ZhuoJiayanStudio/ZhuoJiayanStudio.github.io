<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">卓嘉彥嘅圖書館</title>
    
    <!-- 性能优化：预加载关键资源 -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-..." crossorigin="anonymous">
    
    <link rel="stylesheet" href="https://zhuojiayanstudio.github.io/styles.min.css" />
    <style>
        /* 复用 themes/base.css 的部分样式 */
        body, .container, .lang-switch, .search-box, .book-item, .empty-state, .footer, .book-header, .book-icon, .book-arrow, .book-meta, .badge, .pdf-badge, .highlight, .share-btn, .mood-icon, .ripple, .skeleton, .loader {
            @applyThemesBase;
        }
    </style>
</head>
<body>
    <div class="loader" id="loader" role="progressbar" aria-label="頁面加載中"><i class="fas fa-spinner"></i></div>
    <div class="container" id="mainContainer">
        <div class="lang-switch" role="navigation" aria-label="語言切換">
            <a href="index.html" id="linkZh" aria-label="切換到中文">中文</a> | 
            <a href="index-yue.html" id="linkYue" aria-label="切換到粤语">粵語</a> | 
            <a href="index-en.html" id="linkEn" aria-label="切換到英文">English</a>
        </div>

        <h1><i class="fas fa-book-open" aria-hidden="true"></i> <span id="mainTitle">卓嘉彥嘅圖書館</span></h1>
        <p class="subtitle" id="subTitle">呢個圖書館係用嚟保存一啲開源嘅編程書籍</p>
        
        <div class="search-box">
            <i class="fas fa-search" aria-hidden="true"></i>
            <input type="text" id="searchInput" placeholder="搜尋書籍..." aria-label="搜尋書籍" oninput="filterBooks()">
        </div>
        
        <div class="skeleton-container" id="skeletonContainer">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>
        
        <ul class="book-list" id="bookList" role="list" aria-label="書籍列表"></ul>

        <div class="empty-state" id="emptyState">
            <i class="fas fa-search-minus" aria-hidden="true"></i>
            <p id="emptyText">搵唔到相關書籍</p>
            <small id="emptyHint">試下其他關鍵詞？</small>
        </div>

        <div class="footer">
            <p><span id="maintainerText">維護人：卓嘉彥</span> <span class="mood-icon" id="moodIcon" onclick="toggleMood()" title="撳切換心情" role="button" tabindex="0" aria-label="切換心情圖標">💻</span></p>
            <p style="margin-top: 8px; font-size: 0.8em; color: rgba(255, 255, 255, 0.7);" id="footerCredit">伺服器由 GitHub Pages 提供</p>
            <button class="share-btn" onclick="shareSurprise(this)" id="shareBtn" aria-label="分享驚喜頁面"><i class="fas fa-share-alt" aria-hidden="true"></i> <span id="shareText">分享</span></button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/pinyin-map.js"></script>
    <script src="js/library.js"></script>
</body>
</html>
