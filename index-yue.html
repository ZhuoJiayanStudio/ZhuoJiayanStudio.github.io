<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卓嘉彥嘅圖書館</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            max-width: 700px;
            width: 100%;
            text-align: center;
            position: relative;
        }

        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 16px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .lang-switch a {
            color: #764ba2;
            text-decoration: none;
            margin: 0 8px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .lang-switch a:hover {
            color: #667eea;
            text-decoration: underline;
        }

        .lang-switch strong {
            color: #333;
            margin: 0 8px;
            font-size: 0.9em;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .book-list {
            list-style: none;
            text-align: left;
        }

        .book-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px 25px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            border-left: 4px solid #667eea;
        }

        .book-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
        }

        .book-item a {
            color: #667eea;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
        }

        .book-item a:hover {
            color: #764ba2;
        }

        .book-meta {
            color: #888;
            font-size: 0.9em;
            line-height: 1.5;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.85em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-switch">
            <a href="index.html">中文</a> | <strong>粵語</strong> | <a href="index-en.html">English</a>
        </div>

        <h1>📚 卓嘉彥嘅圖書館</h1>
        <p class="subtitle">呢個圖書館係用嚟保存一啲開源嘅編程書籍</p>
        
        <ul class="book-list">
            <li class="book-item">
                <a href="https://zhuojiayanstudio.github.io/books/linux-concise-cmd-zh_CN.pdf">Ubuntu Linux命令行簡明教程</a>
                <div class="book-meta">
                    作者：Magi Su | 年份：2006 | 開源協議：GNU/GPL | <span style="color: #e74c3c;">僅限簡體中文 🇨🇳</span>
                </div>
            </li>
        </ul>

        <div style="margin-top: 30px; padding: 20px; background: #fff3cd; border-radius: 12px; border-left: 4px solid #ffc107;">
            <p style="color: #856404; font-weight: 600; margin-bottom: 10px;">📖 搵緊繁體中文資源？</p>
            <p style="color: #856404; font-size: 0.9em;">可以睇下 <a href="https://linux.vbird.org/" style="color: #764ba2; font-weight: 600;">鳥哥的 Linux 私房菜</a>—— 台灣最出名嘅免費 Linux 教程，繁體中文版，採用 CC BY-SA 開源協議。</p>
        </div>

        <div class="footer">
            <p>維護人：卓嘉彥</p>
            <p style="margin-top: 8px; font-size: 0.8em; color: #aaa;">伺服器由 GitHub Pages 提供 | 編寫由 QClaw 調用 Kimi 完成</p>
        </div>
    </div>
</body>
</html>
