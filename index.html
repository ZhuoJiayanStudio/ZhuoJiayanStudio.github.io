<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卓嘉彦的图书馆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            max-width: 700px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .book-list {
            list-style: none;
            text-align: left;
        }

        .book-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px 25px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            border-left: 4px solid #667eea;
        }

        .book-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
        }

        .book-item a {
            color: #667eea;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
        }

        .book-item a:hover {
            color: #764ba2;
        }

        .book-meta {
            color: #888;
            font-size: 0.9em;
            line-height: 1.5;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.85em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 卓嘉彦的图书馆</h1>
        <p class="subtitle">该图书馆旨在保存一些开源的编程书籍</p>
        
        <ul class="book-list">
            <li class="book-item">
                <a href="https://zhuojiayanstudio.github.io/books/linux-concise-cmd-zh_CN.pdf">Ubuntu Linux命令行简明教程</a>
                <div class="book-meta">
                    作者：Magi Su | 年代：2006 | 开源协议：GNU/GPL
                </div>
            </li>
        </ul>

        <div class="footer">
            <p>由 ZhuoJiayanStudio 维护</p>
        </div>
    </div>
</body>
</html>
