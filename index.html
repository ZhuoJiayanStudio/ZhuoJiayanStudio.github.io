<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">卓嘉彦的图书馆</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-gradient-start: #667eea;
            --primary-gradient-end: #764ba2;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: rgba(0, 0, 0, 0.2);
            --text-primary: #fff;
            --text-secondary: rgba(255, 255, 255, 0.9);
            --text-muted: rgba(255, 255, 255, 0.75);
            --text-dim: rgba(255, 255, 255, 0.6);
            --accent-color: #764ba2;
            --hover-bg: rgba(255, 255, 255, 0.35);
            --badge-bg: rgba(255, 255, 255, 0.15);
            --success-color: rgba(76, 175, 80, 0.4);
            --success-border: rgba(76, 175, 80, 0.5);
            --highlight-color: #ffcc00;
            --ripple-color: rgba(255, 255, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, var(--primary-gradient-start) 0%, var(--primary-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 
                0 8px 32px var(--glass-shadow),
                inset 0 1px 0 rgba(255, 255, 255, 0.4);
            padding: 50px 40px;
            max-width: 700px;
            width: 100%;
            text-align: center;
            transition: backdrop-filter 0.3s ease;
        }

        .container:hover {
            backdrop-filter: blur(22px) saturate(190%);
        }

        .lang-switch {
            position: fixed;
            top: 20px;
            right: max(20px, calc(50% - 350px));
            z-index: 1000;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px) saturate(150%);
            -webkit-backdrop-filter: blur(10px) saturate(150%);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .lang-switch a {
            color: var(--accent-color);
            text-decoration: none;
            margin: 0 8px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .lang-switch a:hover {
            color: var(--primary-gradient-start);
            text-decoration: underline;
        }

        .lang-switch strong {
            color: #333;
            margin: 0 8px;
            font-size: 0.9em;
        }

        h1 {
            color: var(--text-primary);
            font-size: 2.5em;
            margin-bottom: 15px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1em;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .search-box {
            position: relative;
            margin-bottom: 30px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: var(--text-primary);
            font-size: 1em;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input::placeholder {
            color: var(--text-dim);
        }

        .search-box input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .search-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 1em;
        }

        .book-list {
            list-style: none;
            text-align: left;
        }

        .book-item {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px 25px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 4px solid rgba(255, 255, 255, 0.5);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            animation: slideIn 0.5s ease forwards;
            position: relative;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 动画延迟由 JS 动态设置 */

        .book-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
            pointer-events: none;
        }

        .book-item:hover::before {
            left: 100%;
        }

        .book-item:hover {
            transform: translateX(5px);
            background: var(--hover-bg);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            border-left-color: var(--text-primary);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .book-item.hidden {
            display: none;
        }

        .book-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .book-icon {
            font-size: 1.3em;
            color: var(--text-primary);
            opacity: 0.9;
        }

        .book-item a {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            flex: 1;
            pointer-events: none;
        }

        .book-arrow {
            color: var(--text-dim);
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .book-item:hover .book-arrow {
            color: var(--text-primary);
            transform: translateX(3px);
        }

        .book-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 12px;
            background: var(--badge-bg);
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 0.8em;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .book-item:hover .badge {
            background: rgba(255, 255, 255, 0.2);
        }

        .book-item .book-meta a {
            font-size: 0.9em;
            font-weight: 500;
            pointer-events: auto;
        }

        .pdf-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(255, 100, 100, 0.3);
            border: 1px solid rgba(255, 100, 100, 0.4);
            font-size: 0.7em;
            color: #ffcccc;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .highlight {
            color: var(--highlight-color);
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
            display: none;
        }

        .empty-state.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .empty-state i {
            font-size: 3em;
            margin-bottom: 15px;
            opacity: 0.7;
        }

        .empty-state p {
            font-size: 1.1em;
            margin-bottom: 8px;
        }

        .empty-state small {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .share-btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-primary);
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            animation: breathe 3s ease-in-out infinite;
        }

        .share-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            animation: none;
        }

        .share-btn.copied {
            background: var(--success-color);
            border-color: var(--success-border);
            animation: none;
        }

        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-muted);
            font-size: 0.85em;
        }

        .mood-icon {
            cursor: pointer;
            display: inline-block;
            transition: transform 0.3s ease;
            margin-left: 5px;
        }

        .mood-icon:hover {
            transform: scale(1.2) rotate(10deg);
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: var(--ripple-color);
            transform: scale(0);
            animation: rippleEffect 0.6s ease-out;
            pointer-events: none;
        }

        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.1) 25%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.1) 75%);
            background-size: 200% 100%;
            animation: skeletonLoading 1.5s ease-in-out infinite;
            border-radius: 16px;
            height: 80px;
            margin-bottom: 15px;
        }

        .skeleton-container {
            display: none;
        }

        .skeleton-container.active {
            display: block;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.8em;
            }
            .lang-switch {
                position: relative;
                top: auto;
                right: auto;
                margin-bottom: 20px;
                display: inline-block;
            }
            .book-header {
                flex-wrap: wrap;
            }
            .book-meta {
                gap: 4px;
            }
            .badge {
                font-size: 0.75em;
                padding: 3px 8px;
            }
        }

        .loader {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, var(--primary-gradient-start) 0%, var(--primary-gradient-end) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loader i {
            font-size: 3em;
            color: rgba(255, 255, 255, 0.8);
            animation: spin 1s linear infinite;
        }

        /* Keyframes */
        @keyframes slideIn {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes rippleEffect {
            to { transform: scale(4); opacity: 0; }
        }
        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 5px rgba(255,255,255,0.2); }
            50% { box-shadow: 0 0 20px rgba(255,255,255,0.4), 0 0 40px rgba(255,255,255,0.1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes skeletonLoading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <div class="loader" id="loader" role="progressbar" aria-label="页面加载中"><i class="fas fa-spinner"></i></div>
    <div class="container" id="mainContainer">
        <div class="lang-switch" role="navigation" aria-label="语言切换">
            <a href="index.html" id="linkZh" aria-label="切换到中文">中文</a> | 
            <a href="index-yue.html" id="linkYue" aria-label="切换到粤语">粵語</a> | 
            <a href="index-en.html" id="linkEn" aria-label="切换到英文">English</a>
        </div>

        <h1><i class="fas fa-book-open" aria-hidden="true"></i> <span id="mainTitle">卓嘉彦的图书馆</span></h1>
        <p class="subtitle" id="subTitle">该图书馆旨在保存一些开源的编程书籍</p>
        
        <div class="search-box">
            <i class="fas fa-search" aria-hidden="true"></i>
            <input type="text" id="searchInput" placeholder="搜索书籍标题..." aria-label="搜索书籍" oninput="filterBooks()">
        </div>
        
        <div class="skeleton-container" id="skeletonContainer">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>
        
        <ul class="book-list" id="bookList" role="list" aria-label="书籍列表">
            <!-- 书籍由 JSON 动态加载 -->
        </ul>

        <div class="empty-state" id="emptyState">
            <i class="fas fa-search-minus" aria-hidden="true"></i>
            <p id="emptyText">未找到相关书籍</p>
            <small id="emptyHint">试试其他关键词？</small>
        </div>

        <div class="footer">
            <p><span id="maintainerText">维护人：卓嘉彦</span> <span class="mood-icon" id="moodIcon" onclick="toggleMood()" title="点击切换心情" role="button" tabindex="0" aria-label="切换心情图标">💻</span></p>
            <p style="margin-top: 8px; font-size: 0.8em; color: rgba(255, 255, 255, 0.7);" id="footerCredit">服务器由 GitHub Pages 提供 | 编写由 QClaw 调用 Kimi 完成</p>
            <button class="share-btn" onclick="shareSurprise(this)" id="shareBtn" aria-label="分享惊喜页面"><i class="fas fa-share-alt" aria-hidden="true"></i> <span id="shareText">分享</span></button>
        </div>
    </div>
    <script>
        // ==================== 语言配置 ====================
        const I18N = {
            zh: {
                pageTitle: '卓嘉彦的图书馆',
                mainTitle: '卓嘉彦的图书馆',
                subTitle: '该图书馆旨在保存一些开源的编程书籍',
                searchPlaceholder: '搜索书籍标题...',
                searchAria: '搜索书籍',
                bookListAria: '书籍列表',
                emptyText: '未找到相关书籍',
                emptyHint: '试试其他关键词？',
                maintainer: '维护人：卓嘉彦',
                moodTitle: '点击切换心情',
                moodAria: '切换心情图标',
                footerCredit: '服务器由 GitHub Pages 提供 | 编写由 QClaw 调用 Kimi 完成',
                shareText: '分享',
                shareAria: '分享惊喜页面',
                shareCopied: '已复制',
                loaderAria: '页面加载中',
                langSwitchAria: '语言切换',
                linkZh: '中文',
                linkYue: '粵語',
                linkEn: 'English',
                categoryIcons: {
                    'Linux': 'fab fa-linux',
                    '人工智能': 'fas fa-brain',
                    '编程语言': 'fas fa-code',
                    '数理逻辑': 'fas fa-brain'
                },
                langBadge: '英文版',
                langBadgeIcon: 'fas fa-globe-americas',
                loadError: '加载书籍失败，请刷新页面重试',
                currentPage: 'index.html',
                htmlLang: 'zh-CN'
            },
            yue: {
                pageTitle: '卓嘉彥嘅圖書館',
                mainTitle: '卓嘉彥嘅圖書館',
                subTitle: '呢個圖書館係用嚟保存一啲開源嘅編程書籍',
                searchPlaceholder: '搜尋書籍...',
                searchAria: '搜尋書籍',
                bookListAria: '書籍列表',
                emptyText: '搵唔到相關書籍',
                emptyHint: '試下其他關鍵詞？',
                maintainer: '維護人：卓嘉彥',
                moodTitle: '撳切換心情',
                moodAria: '切換心情圖標',
                footerCredit: '伺服器由 GitHub Pages 提供 | 編寫由 QClaw 調用 Kimi 完成',
                shareText: '分享',
                shareAria: '分享驚喜頁面',
                shareCopied: '已複製',
                loaderAria: '頁面加載中',
                langSwitchAria: '語言切換',
                linkZh: '中文',
                linkYue: '粵語',
                linkEn: 'English',
                categoryIcons: {
                    'Linux': 'fab fa-linux',
                    '人工智能': 'fas fa-brain',
                    '编程语言': 'fas fa-code',
                    '数理逻辑': 'fas fa-brain'
                },
                langBadge: '英文版',
                langBadgeIcon: 'fas fa-globe-americas',
                loadError: '加載書籍失敗，請刷新頁面重試',
                currentPage: 'index-yue.html',
                htmlLang: 'zh-HK'
            },
            en: {
                pageTitle: "Zhuo Jiayan's Library",
                mainTitle: "Zhuo Jiayan's Library",
                subTitle: 'This library aims to save some open-source programming books<br>(You know, "save" means "keep", not "rescue"...)',
                searchPlaceholder: 'Search books...',
                searchAria: 'Search books',
                bookListAria: 'Book list',
                emptyText: 'No books found',
                emptyHint: 'Try different keywords?',
                maintainer: 'Maintained by: Zhuo Jiayan',
                moodTitle: 'Click to change mood',
                moodAria: 'Toggle mood icon',
                footerCredit: 'Hosted by GitHub Pages | Written by QClaw calling Kimi',
                shareText: 'Share',
                shareAria: 'Share surprise page',
                shareCopied: 'Copied',
                loaderAria: 'Loading page',
                langSwitchAria: 'Language switch',
                linkZh: '中文',
                linkYue: '粵語',
                linkEn: 'English',
                categoryIcons: {
                    'Linux': 'fab fa-linux',
                    'AI': 'fas fa-brain',
                    'Programming': 'fas fa-code',
                    'Logic': 'fas fa-brain'
                },
                langBadge: 'Chinese',
                langBadgeIcon: 'fas fa-globe-asia',
                loadError: 'Failed to load books. Please refresh.',
                currentPage: 'index-en.html',
                htmlLang: 'en'
            }
        };

        // 根据当前文件名检测语言
        function detectLang() {
            const path = window.location.pathname;
            if (path.includes('index-yue')) return 'yue';
            if (path.includes('index-en')) return 'en';
            return 'zh';
        }

        const LANG = detectLang();
        const T = I18N[LANG];

        // 应用语言设置
        function applyLanguage() {
            document.documentElement.lang = T.htmlLang;
            document.getElementById('pageTitle').textContent = T.pageTitle;
            document.getElementById('mainTitle').textContent = T.mainTitle;
            document.getElementById('subTitle').innerHTML = T.subTitle;
            document.getElementById('searchInput').placeholder = T.searchPlaceholder;
            document.getElementById('searchInput').setAttribute('aria-label', T.searchAria);
            document.getElementById('bookList').setAttribute('aria-label', T.bookListAria);
            document.getElementById('emptyText').textContent = T.emptyText;
            document.getElementById('emptyHint').textContent = T.emptyHint;
            document.getElementById('maintainerText').textContent = T.maintainer;
            document.getElementById('moodIcon').setAttribute('title', T.moodTitle);
            document.getElementById('moodIcon').setAttribute('aria-label', T.moodAria);
            document.getElementById('footerCredit').textContent = T.footerCredit;
            document.getElementById('shareText').textContent = T.shareText;
            document.getElementById('shareBtn').setAttribute('aria-label', T.shareAria);
            document.getElementById('loader').setAttribute('aria-label', T.loaderAria);
            document.querySelector('.lang-switch').setAttribute('aria-label', T.langSwitchAria);
            
            // 更新语言切换链接文本
            document.getElementById('linkZh').textContent = T.linkZh;
            document.getElementById('linkYue').textContent = T.linkYue;
            document.getElementById('linkEn').textContent = T.linkEn;
            
            // 高亮当前语言
            const langMap = { zh: 'linkZh', yue: 'linkYue', en: 'linkEn' };
            Object.keys(langMap).forEach(function(key) {
                const el = document.getElementById(langMap[key]);
                if (key === LANG) {
                    const strong = document.createElement('strong');
                    strong.textContent = el.textContent;
                    el.parentNode.insertBefore(strong, el);
                    el.remove();
                }
            });
        }

        // 页面加载时应用语言
        applyLanguage();

        // ==================== 分类图标映射 ====================
        const categoryIcons = T.categoryIcons;

        // ==================== 从 JSON 加载书籍 ====================
        async function loadBooksFromJSON() {
            const bookList = document.getElementById('bookList');
            const skeletonContainer = document.getElementById('skeletonContainer');
            const loader = document.getElementById('loader');
            
            skeletonContainer.classList.add('active');
            bookList.style.opacity = '0';
            
            try {
                const response = await fetch('library-data.json');
                const allBooks = await response.json();
                
                // 过滤出当前页面显示的书籍
                const currentPage = T.currentPage;
                const books = allBooks.filter(book => book.pages && book.pages.includes(currentPage));
                
                // 缓存数据
                allBooksData = allBooks;
                currentBooksData = books;
                
                // 渲染书籍列表
                renderBookList(books);
                
            } catch (error) {
                console.error('加载书籍失败:', error);
                bookList.innerHTML = '<li class="book-item" style="text-align:center"><i class="fas fa-exclamation-triangle"></i> ' + T.loadError + '</li>';
            } finally {
                loader.classList.add('hidden');
                skeletonContainer.classList.remove('active');
                bookList.style.opacity = '1';
                bookList.style.transition = 'opacity 0.5s ease';
            }
        }

        // ==================== 绑定书籍事件 ====================
        function bindBookEvents() {
            document.querySelectorAll('.book-item').forEach(function(item) {
                item.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();

        // 获取字符串的拼音形式（用于搜索匹配）
        function getPinyin(text) {
            let result = '';
            for (let char of text) {
                result += charToPinyin[char] || char;
            }
            return result;
        }

        // 检查拼音匹配（支持：直接匹配、拼音首字母匹配、全拼匹配）
        function matchesPinyin(text, query) {
            if (!query || query.length === 0) return true;
            const lowerText = text.toLowerCase();
            const lowerQuery = query.toLowerCase();
            
            // 直接匹配
            if (lowerText.includes(lowerQuery)) return true;
            
            // 将书名转为拼音
            const pinyinText = getPinyin(text).toLowerCase();
            
            // 全拼匹配
            if (pinyinText.includes(lowerQuery)) return true;
            
            // 拼音首字母匹配
            const pinyinChars = getPinyin(text).split('');
            let queryIndex = 0;
            for (let char of pinyinChars) {
                if (char.toLowerCase() === lowerQuery[queryIndex]) {
                    queryIndex++;
                    if (queryIndex === lowerQuery.length) return true;
                }
            }
            
            return false;
        }

        // 转义正则特殊字符
        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // 当前页面书籍数据缓存
        let currentBooksData = [];
        let allBooksData = [];

        // 搜索过滤（使用 requestAnimationFrame 保证 60fps）
        let searchRafId = null;
        function filterBooks() {
            if (searchRafId) {
                cancelAnimationFrame(searchRafId);
            }
            searchRafId = requestAnimationFrame(function() {
                const query = document.getElementById('searchInput').value.toLowerCase().trim();
                const bookList = document.getElementById('bookList');
                const emptyState = document.getElementById('emptyState');
                
                if (!query) {
                    renderBookList(currentBooksData);
                    emptyState.classList.remove('visible');
                    return;
                }
                
                // 从数据中过滤
                const filtered = currentBooksData.filter(function(book) {
                    return matchesPinyin(book.title, query);
                });
                
                renderBookList(filtered, query);
                
                // 显示/隐藏空状态
                if (filtered.length === 0) {
                    emptyState.classList.add('visible');
                } else {
                    emptyState.classList.remove('visible');
                }
            });
        }

        // 渲染书籍列表（支持可选高亮查询）
        function renderBookList(books, highlightQuery) {
            const bookList = document.getElementById('bookList');
            
            if (books.length === 0) {
                bookList.innerHTML = '';
                return;
            }
            
            bookList.innerHTML = books.map(function(book, index) {
                let titleHtml = book.title;
                if (highlightQuery) {
                    const regex = new RegExp('(' + escapeRegex(highlightQuery) + ')', 'gi');
                    titleHtml = book.title.replace(regex, '<span class="highlight">$1</span>');
                }
                
                return '<li class="book-item" data-category="' + book.category + '" onclick="openBook(this)" role="listitem" tabindex="0" aria-label="' + book.title + '，按Enter打开" style="animation-delay: ' + ((index + 1) * 0.1) + 's">' +
                    '<div class="book-header">' +
                        '<i class="' + (categoryIcons[book.category] || 'fas fa-book') + ' book-icon" aria-hidden="true"></i>' +
                        '<a href="' + book.url + '" target="_blank" aria-label="阅读 ' + book.title + '">' + titleHtml + '</a>' +
                        (/\.pdf(?:\?|$)/i.test(book.url) ? '<span class="pdf-badge"><i class="fas fa-file-pdf" aria-hidden="true"></i> PDF</span>' : '') +
                        '<i class="fas fa-arrow-right book-arrow" aria-hidden="true"></i>' +
                    '</div>' +
                    '<div class="book-meta">' +
                        (book.author ? '<span class="badge"><i class="fas fa-user" aria-hidden="true"></i> ' + book.author + '</span>' : '') +
                        (book.year ? '<span class="badge"><i class="fas fa-calendar" aria-hidden="true"></i> ' + book.year + '</span>' : '') +
                        (book.license ? '<span class="badge"><i class="fas fa-balance-scale" aria-hidden="true"></i> ' + book.license + '</span>' : '') +
                        (book.language === (LANG === 'en' ? 'Chinese' : '英文') ? '<span class="badge"><i class="' + T.langBadgeIcon + '" aria-hidden="true"></i> ' + T.langBadge + '</span>' : '') +
                        (book.tags ? book.tags.split(',').map(function(tag) { return '<span class="badge"><i class="fas fa-tag" aria-hidden="true"></i> ' + tag.trim() + '</span>'; }).join('') : '') +
                    '</div>' +
                '</li>';
            }).join('');
            
            bindBookEvents();
        }

        // 打开书籍
        function openBook(item) {
            const link = item.querySelector('a');
            if (link) {
                window.open(link.href, '_blank');
            }
        }

        // 从书名查找URL（用于搜索高亮后点击）
        function findBookUrl(title) {
            const book = currentBooksData.find(function(b) { return b.title === title; });
            return book ? book.url : null;
        }

        // 键盘和波纹事件由 bindBookEvents() 统一绑定

        function createRipple(e, element) {
            const rect = element.getBoundingClientRect();
            const ripple = document.createElement('span');
            const size = Math.max(rect.width, rect.height);
            const x = e.clientX - rect.left - size / 2;
            const y = e.clientY - rect.top - size / 2;
            
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.classList.add('ripple');
            
            element.appendChild(ripple);
            
            setTimeout(function() {
                ripple.remove();
            }, 600);
        }

        // 心情图标切换
        const moods = ['💻', '📚', '☕', '🚀', '🎯'];
        let moodIndex = 0;
        function toggleMood() {
            moodIndex = (moodIndex + 1) % moods.length;
            const icon = document.getElementById('moodIcon');
            icon.textContent = moods[moodIndex];
            // 添加弹跳动画
            icon.style.transform = 'scale(1.3) rotate(15deg)';
            setTimeout(function() {
                icon.style.transform = '';
            }, 200);
        }

        // 鼠标移动环境光效果（节流：每帧最多执行一次）
        const container = document.getElementById('mainContainer');
        let lightRafId = null;
        document.addEventListener('mousemove', function(e) {
            if (lightRafId) return;
            lightRafId = requestAnimationFrame(function() {
                lightRafId = null;
                const rect = container.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;
                const y = (e.clientY - rect.top) / rect.height;
                const offsetX = (x - 0.5) * 20;
                const offsetY = (y - 0.5) * 20;
                container.style.boxShadow = 
                    (8 + offsetX) + 'px ' + (32 + offsetY) + 'px 32px var(--glass-shadow), ' +
                    'inset 0 1px 0 rgba(255, 255, 255, 0.4)';
            });
        });
    </script>
</body>
